<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uni-On | 입장하기</title>
    <style>
        body {
            background: linear-gradient(135deg, #f0fdfa 0%, #e2e8f0 100%);
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background-color: #ffffff;
            width: 440px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(15, 118, 110, 0.08);
            text-align: center;
        }

        .logo { color: #14b8a6; font-size: 32px; font-weight: 800; margin-bottom: 20px; }

        /* 카메라 미리보기 영역 */
        #preview {
            width: 100%;
            height: 200px;
            background-color: #333;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { font-size: 13px; color: #64748b; margin-bottom: 5px; display: block; }
        .input-group input {
            width: 100%; padding: 14px; border: 1px solid #cbd5e1;
            border-radius: 12px; box-sizing: border-box;
        }

        .btn-enter {
            width: 100%; padding: 16px; background-color: #14b8a6;
            color: white; border: none; border-radius: 12px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-enter:hover { background-color: #0f766e; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">Uni-On</div>
    
    <!-- 카메라 미리보기 -->
    <div id="preview">카메라 미리보기 (대기 중)</div>

    <div class="input-group">
        <label>방 번호</label>
        <input type="text" id="roomNumber" placeholder="방 번호를 입력하세요">
    </div>
    <div class="input-group">
        <label>비밀번호</label>
        <input type="password" id="roomPassword" placeholder="비밀번호">
    </div>
    <div class="input-group">
        <label>닉네임</label>
        <input type="text" id="userName" placeholder="사용할 닉네임">
    </div>

    <button class="btn-enter" onclick="joinRoom()">회의실 입장하기</button>
</div>

<script>
    // 카메라 미리보기 활성화 로직
    async function initPreview() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.style.width = '100%';
            document.getElementById('preview').innerHTML = '';
            document.getElementById('preview').appendChild(video);
        } catch (err) {
            document.getElementById('preview').innerText = "카메라를 찾을 수 없습니다.";
        }
    }
    initPreview();

    function joinRoom() {
        const room = document.getElementById('roomNumber').value;
        const pass = document.getElementById('roomPassword').value;
        const name = document.getElementById('userName').value;

        if(room && pass && name) {
            // 입장 정보 저장 (추후 room.html에서 확인 가능)
            localStorage.setItem('roomData', JSON.stringify({room, name}));
            location.href = 'room.html';
        } else {
            alert("모든 정보를 입력해주세요!");
        }
    }
</script>
</body>
</html>
